<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spray Prototype Lab</title>
    <link rel="stylesheet" href="./spray-prototype.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel left-panel">
        <div class="panel-header">
          <p class="eyebrow">Prototype Lab</p>
          <h1>Spray Paint Simulator</h1>
          <p class="subtle">Ten-particle harness ready. Press <kbd>D</kbd> for one particle or <kbd>F</kbd> for a 10-particle burst.</p>
        </div>

        <section class="control-group">
          <div class="group-header">
            <h2>Paint</h2>
            <span id="colorValue" class="value-chip">#ff5f1f</span>
          </div>
          <div class="color-picker-wrap">
            <canvas id="colorWheel" width="220" height="220" aria-label="Color wheel"></canvas>
            <div id="colorPreview" class="color-preview"></div>
          </div>
          <label class="slider-row">
            <span>Value</span>
            <input id="valueSlider" type="range" min="0.2" max="1" step="0.01" value="1">
          </label>
        </section>

        <section class="control-group">
          <div class="group-header">
            <h2>Emitter</h2>
            <div class="toolbar-actions">
              <button id="deployBtn" type="button">1 Particle</button>
              <button id="burstBtn" type="button">10 Particle Burst</button>
            </div>
          </div>
          <label class="slider-row">
            <span>Distance To Surface</span>
            <input id="distanceSlider" type="range" min="12" max="120" step="1" value="72">
            <output id="distanceValue">72</output>
          </label>
          <label class="slider-row">
            <span>Depth</span>
            <input id="depthSlider" type="range" min="0.5" max="3" step="0.05" value="1">
            <output id="depthValue">1.00</output>
          </label>
          <label class="slider-row">
            <span>Cone Angle</span>
            <input id="coneSlider" type="range" min="0" max="0.6" step="0.01" value="0.15">
            <output id="coneValue">0.15</output>
          </label>
          <label class="slider-row">
            <span>Velocity</span>
            <input id="velocitySlider" type="range" min="2" max="12" step="0.1" value="6">
            <output id="velocityValue">6.0</output>
          </label>
        </section>

        <section class="control-group">
          <div class="group-header">
            <h2>Harness</h2>
          </div>
          <div class="button-grid">
            <button id="test1Btn" type="button">1 Particle</button>
            <button id="test2Btn" type="button">2 Same Spot</button>
            <button id="test3Btn" type="button">2 Separated</button>
            <button id="test4Btn" type="button">Depth Sweep</button>
            <button id="test10Btn" type="button">10 Particle Fan</button>
            <button id="clearBtn" type="button">Clear</button>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <section class="canvas-card">
          <div class="canvas-toolbar">
            <span>Simulation View</span>
            <span class="toolbar-hint">Click canvas to aim the spray</span>
          </div>
          <canvas id="simCanvas" width="960" height="640"></canvas>
        </section>
      </main>

      <aside class="panel right-panel">
        <section class="control-group">
          <div class="group-header">
            <h2>Live Readout</h2>
          </div>
          <div id="stats" class="stats-grid"></div>
        </section>

        <section class="control-group">
          <div class="group-header">
            <h2>Selected Particle</h2>
          </div>
          <pre id="particleReadout" class="readout">No particle yet.</pre>
        </section>

        <section class="control-group">
          <div class="group-header">
            <h2>Event Log</h2>
          </div>
          <div id="eventLog" class="event-log"></div>
        </section>
      </aside>
    </div>

    <script src="./spray-sim-core.js"></script>
    <script src="./spray-prototype.js"></script>
  </body>
</html>
